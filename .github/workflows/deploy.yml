name: Build and Deploy

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  code-linting:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Setup Node + Yarn
        uses: ./.github/actions/setup_npm_and_yarn
        with:
          node-version: '24.2.0'
          working-directory: .

      - name: SLSA
        uses: ministryofjustice/devsecops-actions/sca/slsa@4cd163be7859cd130800d6719d925318826038ea

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run ESLint
        run: yarn lint

  code-security-audit:
    name: Code Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6.3.0
        with:
          node-version: '24.2.0'

      - name: Enable Corepack
        run: corepack enable

      - name: SLSA
        uses: ministryofjustice/devsecops-actions/sca/slsa@4cd163be7859cd130800d6719d925318826038ea

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run security audit
        run: yarn npm audit

  snyk:
    name: Snyk Security Scan
    uses: ./.github/workflows/snyk.yml
    permissions:
      security-events: write
    with:
      tag: "laa-claim-for-payment-frontend"
    secrets:
      snyk_token: ${{ secrets.SNYK_TOKEN }}

  build-image:
    if: ${{ github.actor != 'dependabot[bot]' }}
    # dependabot can't build as it has no access to secrets
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Set up AWS credentials for ECR and Kubernetes
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 #v6.0.0
        with:
          role-to-assume: ${{ secrets.LAA_CLAIM_FOR_PAYMENT_FRONTEND_ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.LAA_CLAIM_FOR_PAYMENT_FRONTEND_ECR_REGION }}

      - uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 #v2.1.1
        id: login-ecr

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0

      - name: Cache Docker layers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 #v5.0.4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push image with local action
        uses: ./.github/actions/build_and_push
        with:
          image_registry: ${{ secrets.ECR_REGISTRY_URL }}
          image_repo: ${{ vars.LAA_CLAIM_FOR_PAYMENT_FRONTEND_ECR_REPOSITORY }}
          dockerfile_path: Dockerfile
          image_tag: ${{ github.sha }}

  mocha-unit-tests:
    name: Mocha Unit Tests
    uses: ./.github/workflows/mocha.yml
    needs:
      - build-image
    # Only run tests when deploying to UAT
    if: success() && github.event_name != 'workflow_dispatch' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'uat' || github.event.inputs.environment == null)

  playwright:
    name: Playwright Tests
    uses: ./.github/workflows/playwright.yml
    needs:
      - build-image
    # Only run tests when deploying to UAT
    if: success() && github.event_name != 'workflow_dispatch' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'uat' || github.event.inputs.environment == null)

  deploy-dev:
    environment: dev
    runs-on: ubuntu-latest
    needs:
      - code-linting
      - code-security-audit
      - snyk
      - build-image
      - mocha-unit-tests
      - playwright
    if: github.ref_name == 'main'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Deploy to dev
        uses: ./.github/actions/deploy
        with:
          ecr-repository: ${{ vars.LAA_CLAIM_FOR_PAYMENT_FRONTEND_ECR_REPOSITORY }}
          ecr-registry_url: ${{ secrets.ECR_REGISTRY_URL }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: dev
          session_secret: ${{ secrets.SESSION_SECRET }}
          service_name: ${{ vars.SERVICE_NAME }}
          service_phase: ${{ vars.SERVICE_PHASE }}
          department_name: ${{ vars.DEPARTMENT_NAME }}
          department_url: ${{ vars.DEPARTMENT_URL }}
          contact_email: ${{ vars.CONTACT_EMAIL }}
          service_url: ${{ vars.SERVICE_URL }}
          session_name: ${{ vars.SESSION_NAME}}
          ratelimit_headers_enabled: ${{ vars.RATELIMIT_HEADERS_ENABLED }}
          ratelimit_storage_uri: ${{ vars.RATELIMIT_STORAGE_URI }}
          ratelimit_max: ${{ vars.RATE_LIMIT_MAX }}
          ratewindow_ms: ${{ vars.RATE_WINDOW_MS }}

  run-e2e:
    needs:
      - code-linting
      - code-security-audit
      - snyk
      - build-image
      - mocha-unit-tests
      - playwright
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Trigger ZAP workflow run
        uses: ./.github/actions/trigger_workflow
        with:
          app-id: ${{ secrets.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          org: ministryofjustice
          repo: claim-assess-regression-tests
          workflow: qa-ci.yml
          ref: main

  run-zap:
    needs:
      - code-linting
      - code-security-audit
      - snyk
      - build-image
      - mocha-unit-tests
      - playwright
    runs-on: ubuntu-latest
#    if: github.ref_name == 'main' TODO - uncomment before merging
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Trigger ZAP workflow run
        uses: ./.github/actions/trigger_workflow
        with:
          app-id: ${{ secrets.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          org: ministryofjustice
          repo: claim-assess-regression-tests
          workflow: zap.yml
          ref: CLAS-266 # TODO - change to main before merging
          extra-args: '-f target="http://localhost:3000"'

  deploy-uat:
    environment: uat
    runs-on: ubuntu-latest
    needs:
      - run-e2e
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Deploy to UAT
        uses: ./.github/actions/deploy
        with:
          ecr-repository: ${{ vars.LAA_CLAIM_FOR_PAYMENT_FRONTEND_ECR_REPOSITORY }}
          ecr-registry_url: ${{ secrets.ECR_REGISTRY_URL }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: uat
          session_secret: ${{ secrets.SESSION_SECRET }}
          service_name: ${{ vars.SERVICE_NAME }}
          service_phase: ${{ vars.SERVICE_PHASE }}
          department_name: ${{ vars.DEPARTMENT_NAME }}
          department_url: ${{ vars.DEPARTMENT_URL }}
          contact_email: ${{ vars.CONTACT_EMAIL }}
          service_url: ${{ vars.SERVICE_URL }}
          session_name: ${{ vars.SESSION_NAME}}
          ratelimit_headers_enabled: ${{ vars.RATELIMIT_HEADERS_ENABLED }}
          ratelimit_storage_uri: ${{ vars.RATELIMIT_STORAGE_URI }}
          ratelimit_max: ${{ vars.RATE_LIMIT_MAX }}
          ratewindow_ms: ${{ vars.RATE_WINDOW_MS }}

  deploy-staging:
    environment: staging
    runs-on: ubuntu-latest
    needs: run-e2e
    if: github.ref_name == 'main'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Deploy to staging
        uses: ./.github/actions/deploy
        with:
          ecr-repository: ${{ vars.LAA_CLAIM_FOR_PAYMENT_FRONTEND_ECR_REPOSITORY }}
          ecr-registry_url: ${{ secrets.ECR_REGISTRY_URL }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: staging
          session_secret: ${{ secrets.SESSION_SECRET }}
          service_name: ${{ vars.SERVICE_NAME }}
          service_phase: ${{ vars.SERVICE_PHASE }}
          department_name: ${{ vars.DEPARTMENT_NAME }}
          department_url: ${{ vars.DEPARTMENT_URL }}
          contact_email: ${{ vars.CONTACT_EMAIL }}
          service_url: ${{ vars.SERVICE_URL }}
          session_name: ${{ vars.SESSION_NAME}}
          ratelimit_headers_enabled: ${{ vars.RATELIMIT_HEADERS_ENABLED }}
          ratelimit_storage_uri: ${{ vars.RATELIMIT_STORAGE_URI }}
          ratelimit_max: ${{ vars.RATE_LIMIT_MAX }}
          ratewindow_ms: ${{ vars.RATE_WINDOW_MS }}
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

